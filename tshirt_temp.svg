<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500" width="100%" height="100%">
  <defs>
    <marker id="arrowStart" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M 8 1 L 1 4 L 8 7 Z" fill="#E53E3E" />
    </marker>
    <marker id="arrowEnd" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M 1 1 L 8 4 L 1 7 Z" fill="#E53E3E" />
    </marker>
    <style>
      .title { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #1A202C; }
      .subtitle { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; fill: #4A5568; }
      .legend-text { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2D3748; }
      .table-header { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #FFFFFF; }
      .table-cell { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; fill: #2D3748; text-anchor: middle; }
      .measure-label { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #E53E3E; }
      .shirt-path { fill: #F7FAFC; stroke: #2D3748; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
      .measure-line { stroke: #E53E3E; stroke-width: 2; }
      .dash-line { stroke: #A0AEC0; stroke-width: 2; stroke-dasharray: 4; }
    </style>
  </defs>

  <!-- Background transparan (tanpa rect) -->
  <!-- <rect width="100%" height="100%" fill="#ffffff" rx="10" /> -->

  <!-- BOXY SHIRT DRAWING -->
  <g transform="translate(0, 30)">
    <!-- Main Shirt Body -->
    <path class="shirt-path" d="
      M 170 50 
      C 190 80, 230 80, 250 50 
      L 330 80 
      L 380 190 
      L 320 210 
      L 310 160 
      L 310 420 
      L 110 420 
      L 110 160 
      L 100 210 
      L 40 190 
      L 90 80 
      Z" />
      
    <!-- Back Collar Line -->
    <path class="shirt-path" d="M 170 50 C 190 65, 230 65, 250 50" fill="none" />
    
    <!-- Front Collar Ribbing -->
    <path d="M 165 58 C 190 88, 230 88, 255 58" fill="none" stroke="#2D3748" stroke-width="2" />
    
    <!-- Shoulder Drop Seams -->
    <line x1="90" y1="80" x2="110" y2="160" class="dash-line" />
    <line x1="330" y1="80" x2="310" y2="160" class="dash-line" />

    <!-- Measurement Lines -->
    
    <!-- D: Lebar Bahu -->
    <line x1="90" y1="35" x2="330" y2="35" class="measure-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)" />
    <line x1="90" y1="80" x2="90" y2="25" class="dash-line" stroke="#E53E3E" />
    <line x1="330" y1="80" x2="330" y2="25" class="dash-line" stroke="#E53E3E" />
    <rect x="200" y="22" width="20" height="20" fill="white" stroke="#E53E3E" stroke-width="1" />
    <text x="210" y="38" class="measure-label" text-anchor="middle">D</text>

    <!-- B: Panjang Badan -->
    <line x1="210" y1="75" x2="210" y2="420" class="measure-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)" />
    <rect x="200" y="235" width="20" height="20" fill="white" stroke="#E53E3E" stroke-width="1" />
    <text x="210" y="250" class="measure-label" text-anchor="middle">B</text>

    <!-- A: Lebar Dada -->
    <line x1="110" y1="280" x2="310" y2="280" class="measure-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)" />
    <rect x="200" y="270" width="20" height="20" fill="white" stroke="#E53E3E" stroke-width="1" />
    <text x="210" y="285" class="measure-label" text-anchor="middle">A</text>

    <!-- C: Panjang Lengan -->
    <line x1="340" y1="75" x2="390" y2="185" class="measure-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)" />
    <rect x="365" y="115" width="20" height="20" fill="white" stroke="#E53E3E" stroke-width="1" />
    <text x="375" y="130" class="measure-label" text-anchor="middle">C</text>
  </g>
</svg>