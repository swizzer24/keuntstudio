<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Access Locked | Hubungi Creator</title>
    <meta
      name="description"
      content="Akses terbatas. Silakan hubungi creator untuk informasi pembukaan akses."
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #ffffff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #1e1e1e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .card {
        max-width: 620px;
        width: 100%;
        background: #ffffff;
        border-radius: 2rem;
        padding: 2.5rem 2rem;
        box-shadow:
          0 20px 35px -12px rgba(0, 0, 0, 0.05),
          0 0 0 1px #f0f0f0;
        text-align: center;
      }

      .icon-circle {
        background: #f7f7f7;
        width: 104px;
        height: 104px;
        margin: 0 auto 1.8rem auto;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        border: 1px solid #ebebeb;
      }

      .icon-circle i {
        font-size: 3.5rem;
        color: #2c2c2c;
      }

      .title {
        font-size: 2.2rem;
        font-weight: 700;
        color: #000000;
        margin-bottom: 0.5rem;
      }

      .divider-light {
        width: 56px;
        height: 2px;
        background: #e2e2e2;
        margin: 1rem auto;
      }

      .subhead {
        font-size: 0.95rem;
        color: #6b6b6b;
        margin-bottom: 2rem;
      }

      .footer-minimal {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid #efefef;
        font-size: 0.7rem;
        color: #9b9b9b;
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      @media (max-width: 550px) {
        body {
          padding: 1rem;
        }
        .card {
          padding: 1.6rem;
        }
        .title {
          font-size: 1.7rem;
        }
        .icon-circle {
          width: 80px;
          height: 80px;
        }
        .icon-circle i {
          font-size: 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-circle">
        <i class="fas fa-lock"></i>
      </div>
      <h1 class="title">WEBSITE DIKUNCI!!</h1>
      <div class="divider-light"></div>
      <div class="subhead">
        <i
          class="fas fa-shield-alt"
          style="font-size: 0.75rem; margin-right: 6px"
        ></i>
        Akses sementara dibatasi
      </div>
      <div class="footer-minimal">
        <span><i class="fas fa-ban"></i> Status: Restricted</span>
        <span><i class="far fa-clock"></i> Hubungi dev untuk buka blokir</span>
      </div>
    </div>
  </body>
</html>
